<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Game</title>
    <link rel="stylesheet" href="style/insect.css">
</head>
<body>
    <div class = "screen">
        <h1>What is your favorite insect? </h1>
        <ul>
            <li>
                <button class = "choose-insect-btn">
                    <p>Fly</p>
                    <img src="images/ladybug.png" alt="ladybug">
                </button>
            </li>
            <li>
                <button class = "choose-insect-btn">
                    <p>Fly</p>
                    <img src="images/mosquito.png" alt="mosquito">
                </button>
            </li>
            <li>
                <button class = "choose-insect-btn">
                    <p>Fly</p>
                    <img src="images/roach.png" alt="roach">
                </button>
            </li>
            <li><button class = "choose-insect-btn">
                    <p>Fly</p>
                    <img src="images/fly.png" alt="fly">
                </button>
            </li>

        </ul>
    </div>
    <div class="screen game-container" id="game-container">
    <h3 id="time" class="time"> Time :00:00</h3>
    <h3 id="score" class="score"> Score: 0 </h3>
    <h5 id="message" class="message">
        Are you annoyed yet <br>
        You are playing an impossible game!!
    </h5>
    </div>



    <script src="script/insect.js"></script>

</body>
</html>
